version: '3.8'

services:
  sacidata:
    build:
      context: .
      dockerfile: Dockerfile
    image: sacidata:local
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "require('http').get('http://127.0.0.1:3000/healthz', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped