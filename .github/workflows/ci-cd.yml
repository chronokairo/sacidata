name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  validate-build-test:
    runs-on: ubuntu-latest

    env:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: test
      APP_NAME: SACI – Sistema de Avaliação da Qualidade dos Igarapés
      MAP_CENTER_LAT: -3.119
      MAP_CENTER_LNG: -60.021
      MAP_ZOOM: 12
      TILE_URL: https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png
      TILE_ATTRIBUTION: "&copy; OpenStreetMap contributors"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate structure
        run: npm run validate

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sacidata-dist
          path: dist/
          if-no-files-found: error

  docker-build:
    runs-on: ubuntu-latest
    needs: validate-build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sacidata:ci .